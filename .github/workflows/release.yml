name: Release

# Runs on GitHub-hosted runners deliberately: GitHub advises against
# self-hosted runners on public repositories.
on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Publish release for tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify checksum
        run: shasum -a 256 -c us-tax-dataset.json.sha256

      - name: Extract release notes from changelog
        run: |
          set -euo pipefail
          awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md > notes.md
          test -s notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            us-tax-dataset.json us-tax-dataset.json.sha256 \
            --title "US tax dataset ${GITHUB_REF_NAME}" \
            --notes-file notes.md
